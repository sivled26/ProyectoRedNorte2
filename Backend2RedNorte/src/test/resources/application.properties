# Configuraciˇn de la BD H2 en memoria
spring.datasource.url=jdbc:h2:mem:rednorte_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Plataforma Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Esto crearß las tablas automßticamente basadas en tus @Entity al iniciar los tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true